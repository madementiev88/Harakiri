services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: harakiri
      POSTGRES_USER: harakiri
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-harakiri}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harakiri"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - apps/backend/.env
    environment:
      DATABASE_URL: postgresql://harakiri:${POSTGRES_PASSWORD:-harakiri}@postgres:5432/harakiri
      TZ: Europe/Moscow
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  miniapp:
    build:
      context: .
      dockerfile: apps/miniapp/Dockerfile
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - miniapp
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
